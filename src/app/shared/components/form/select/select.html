<div class="relative" [class.pointer-events-none]="disabled()">
    <button
      type="button"
      class="h-11 w-full rounded-lg border appearance-none px-4 py-2.5 text-sm shadow-theme-xs text-left focus:outline-hidden focus:ring-3 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
      [ngClass]="buttonClasses()"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-disabled]="disabled()"
      (click)="toggle()"
      (blur)="onTouched()"
    >
      <span
        class="block truncate"
        [ngClass]="selectedLabel() ? 'text-gray-800 dark:text-white/90' : 'text-gray-400 dark:text-gray-400'"
      >
        {{ selectedLabel() || placeholder() }}
      </span>

      <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2">
        <svg
          width="1em"
          height="1em"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="size-5 fill-gray-500 dark:fill-gray-400"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M5.29289 7.29289C5.68342 6.90237 6.31658 6.90237 6.70711 7.29289L10 10.5858L13.2929 7.29289C13.6834 6.90237 14.3166 6.90237 14.7071 7.29289C15.0976 7.68342 15.0976 8.31658 14.7071 8.70711L10.7071 12.7071C10.3166 13.0976 9.68342 13.0976 9.29289 12.7071L5.29289 8.70711C4.90237 8.31658 4.90237 7.68342 5.29289 7.29289Z"
          />
        </svg>
      </span>
    </button>

    @if (isOpen()) {
      <div
        class="absolute z-50 mt-2 w-full overflow-hidden rounded-lg border border-gray-200 bg-white shadow-lg dark:border-gray-800 dark:bg-gray-900"
      >
        @if (enableSearch()) {
          <div class="border-b border-gray-100 p-2 dark:border-gray-800">
            <input
              type="text"
              class="h-10 w-full rounded-lg border focus:border-brand-300 bg-transparent px-3 text-sm text-gray-800 placeholder:text-gray-400 focus:outline-hidden focus:ring-3 focus:ring-brand-500/20 dark:border-gray-700 dark:text-white/90 dark:placeholder:text-white/30"
              [placeholder]="searchPlaceholder()"
              [value]="query()"
              (input)="onQueryInput($event)"
              (keydown.escape)="close()"
            />
          </div>
        }

        <div class="max-h-60 overflow-auto py-1">
          @if (filteredOptions().length === 0) {
            <div class="px-3 py-2 text-sm text-gray-500 dark:text-gray-400">
              {{ emptyText() }}
            </div>
          } @else {
            @for (opt of filteredOptions(); track opt.value) {
              <button
                type="button"
                class="flex w-full items-center justify-between px-3 py-2 text-left text-sm hover:bg-gray-50 dark:hover:bg-gray-800/60"
                [ngClass]="
                  opt.value === value()
                    ? 'bg-gray-50 text-gray-900 dark:bg-gray-800/60 dark:text-white'
                    : 'text-gray-700 dark:text-gray-200'
                "
                (click)="select(opt.value)"
              >
                <span class="truncate">{{ opt.label }}</span>
                @if (opt.value === value()) {
                  <svg
                    width="1em"
                    height="1em"
                    viewBox="0 0 20 20"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    class="size-5 fill-brand-500"
                  >
                    <path
                      fill-rule="evenodd"
                      clip-rule="evenodd"
                      d="M16.7042 5.29584C17.0947 5.68637 17.0947 6.31953 16.7042 6.71006L8.70418 14.7101C8.31366 15.1006 7.68049 15.1006 7.28997 14.7101L3.29584 10.7159C2.90532 10.3254 2.90532 9.69225 3.29584 9.30172C3.68637 8.9112 4.31953 8.9112 4.71006 9.30172L7.99707 12.5887L15.2899 5.29584C15.6805 4.90532 16.3137 4.90532 16.7042 5.29584Z"
                    />
                  </svg>
                }
              </button>
            }
          }
        </div>
      </div>
    }
  </div>
